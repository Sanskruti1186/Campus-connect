<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campus Connect | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <!-- Logo -->
    <div class="logo-box">
      <div class="logo">
        🎓
      </div>
      <h1>Campus Connect</h1>
      <p class="subtitle">Your gateway to campus life</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="card-subtitle">
        Sign in to access events, clubs, and campus updates
      </p>

      <form id="loginForm">

  <!-- Email -->
  <label>College Email</label>
  <div class="input-group">
    <span class="icon">✉️</span>
    <input type="email" id="email" placeholder="student@college.edu">
  </div>

  <!-- Password -->
  <div class="password-header">
    <label>Password / Code</label>
    <a href="#" class="forgot">Forgot?</a>
  </div>

  <div class="input-group">
    <span class="icon">🔒</span>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <button type="submit">Sign In</button>
</form>

      <p class="signup-text">
        Don’t have an account?
        <a href="signup.html">Sign up here</a>
      </p>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
