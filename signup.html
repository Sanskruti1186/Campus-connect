<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campus Connect | Sign Up</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="page">

  <!-- Logo -->
  <div class="logo-box">
    <div class="logo">🎓</div>
    <h1>Campus Connect</h1>
    <p class="subtitle">Create your campus account</p>
  </div>

  <!-- Signup Card -->
  <div class="signup-card">
    <h2>Create Account</h2>
    <p class="card-subtitle">
      Select your role and fill in the details
    </p>

    <!-- Role Selector -->
    <div class="role-tabs">
      <button class="active" onclick="showForm('student')">Student</button>
      <button onclick="showForm('club')">Club Member</button>
      <button onclick="showForm('admin')">Admin</button>
    </div>

    <!-- STUDENT FORM -->
    <form id="student" class="form active">
      <label>Full Name</label>
      <input type="text" placeholder="Student Name">
      <label>Institute</label>
      <input type="text" placeholder="Institute Name">

      <label>College Email</label>
      <input type="email" placeholder="student@college.edu">

      <label>Roll Number</label>
      <input type="text" placeholder="Roll No">

      <label>Password</label>
      <input type="password" placeholder="••••••••">

      <button type="submit">Sign Up as Student</button>
    </form>

    <!-- CLUB FORM -->
    <form id="club" class="form">
      <label>Club Name</label>
      <input type="text" placeholder="Coding Club">

      <label>Coordinator Email</label>
      <input type="email" placeholder="club@college.edu">

      <label>Department</label>
      <input type="text" placeholder="CSE / IT">

      <label>Password</label>
      <input type="password" placeholder="••••••••">

      <button type="submit">Sign Up as Club</button>
    </form>

    <!-- ADMIN FORM -->
    <form id="admin" class="form">
      <label>Admin Name</label>
      <input type="text" placeholder="Admin Name">

      <label>Official Email</label>
      <input type="email" placeholder="admin@college.edu">

      <label>Admin Code</label>
      <input type="password" placeholder="Secret Code">

      <button type="submit">Sign Up as Admin</button>
    </form>

    <p class="login-text">
      Already have an account?
      <a href="index.html">Sign in here</a>
    </p>

  </div>
</div>

<script src="signup.js"></script>
</body>
</html>
